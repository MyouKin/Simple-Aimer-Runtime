%YAML:1.0

# Camera: mindvision | opencv | video
camera_backend: "mindvision"
camera_source: ""
camera_index: 0
exposure_ms: 20.0
analog_gain: 1.0
gamma: 1.0
flip_code: 0
camera_timeout_ms: 100

# Drone coarse detector.
# trt_engine loads a TensorRT .engine file. The .pt path is kept as the source model
# path; when drone_engine_path is empty, the detector derives the .engine path beside it.
drone_backend: "trt_engine"
drone_model_path: "C:/Users/25176/Resources/Projects/Robomaster/Simple-Aimer-Runtime/applications/laser_aimer/RM-Plane-yolo26n-p2-2026-04-03.pt"
drone_engine_path: "C:/Users/25176/Resources/Projects/Robomaster/Simple-Aimer-Runtime/applications/laser_aimer/RM-Plane-yolo26n-p2-2026-04-03.engine"
drone_input_width: 640
drone_input_height: 640
drone_conf_threshold: 0.25
drone_nms_threshold: 0.45
drone_top_k: 1
drone_max_det: 300
drone_device_id: 0
drone_max_batch: 1
drone_streams: 1
drone_auto_streams: 0
drone_num_classes: 1
drone_apply_sigmoid: 0
drone_preprocess: "letterbox"
drone_output_mode: "auto"
drone_box_format: "cxcywh"

# Fixed target detector, ported from detectortest.py.
roi_padding_ratio: 0.08
h_min: 100
h_max: 140
s_min: 0
s_max: 255
v_min: 200
v_max: 255
close_kernel: 5
min_area: 50.0
max_area: 3000.0
min_aspect: 2.0
max_aspect: 4.0
max_angle_diff_deg: 20.0
min_dist_ratio: 0.5
max_dist_ratio: 1.0

# LaserTracking pixel controller.
yaw_sign: -1.0
pitch_sign: -1.0
kp: 1.2
deadband_px: 1.0
max_angle_rate: 180.0
lowpass_alpha: 0.45
ctrl_dt_nominal_ms: 10.0
ctrl_dt_min_ms: 1.0
ctrl_dt_max_ms: 100.0
use_velocity_ff: 1
ff_alpha: 0.25
ff_rate_max: 150.0
ff_dt_max_ms: 80.0
use_damping: 1
damping_source: "meas"
damping_kd: 0.02
damping_dt_max_ms: 120.0
scan_enable: 1
scan_radius_deg: 12.0
scan_rate_hz: 0.2
scan_pattern: "spiral"
scan_spacing_deg: 6.05
scan_speed_deg_s: 10.0
scan_r_max_deg: 5.0
scan_spiral_return: 0
scan_k_yaw: 2.5
scan_k_pitch: 0.75
scan_enter_delay_ms: 180.0
scan_reacq_confirm_frames: 2

# Replace with your calibrated camera and laser boresight.
fx: 18346.21567737546
fy: 18215.638701919743
cx: 2182.156707136921
cy: 3645.5080162494414
u_L: 100.0
v_L: 100.0

serial_enabled: 1
serial_port: "COM3"
serial_baud: 115200
serial_read_timeout_ms: 2
serial_debug_io: 1
serial_debug_hex: 1
serial_debug_interval_ms: 100

min_detect_count: 1
max_lost_count: 20
loop_rate_hz: 100.0
show_debug: 1
