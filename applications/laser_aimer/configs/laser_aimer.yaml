%YAML:1.0

#build：
#cmd /c "call ""C:\Program Files (x86)\Microsoft Visual Studio\2019\BuildTools\Common7\Tools\VsDevCmd.bat"" -arch=x64 && cmake --build applications/laser_aimer/build --config Release"

# Camera: mindvision | opencv | video
camera_backend: "mindvision"
camera_source: ""
camera_index: 0
exposure_ms: 20.0
analog_gain: 1.0
gamma: 1.0
flip_code: 0
camera_timeout_ms: 100

# Undistort with the calibrated raw camera matrix K, distortion D, and rectified P.
undistort_enable: 1
raw_fx: 2847.305415
raw_fy: 2846.695845
raw_cx: 658.403337
raw_cy: 532.415900
dist_k1: -0.065828
dist_k2: 0.983370
dist_p1: 0.004467
dist_p2: 0.001856
dist_k3: 0.000000
undistort_fx: 2854.342510
undistort_fy: 2851.239471
undistort_cx: 659.172967
undistort_cy: 534.105012

# Drone coarse detector.
# trt_engine loads a TensorRT .engine file. The .pt path is kept as the source model
# path; when drone_engine_path is empty, the detector derives the .engine path beside it.
drone_backend: "trt_engine"
drone_model_path: "C:/Users/25176/Resources/Projects/Robomaster/Simple-Aimer-Runtime/applications/laser_aimer/RM-Plane-yolo26n-p2-2026-04-03.pt"
drone_engine_path: "C:/Users/25176/Resources/Projects/Robomaster/Simple-Aimer-Runtime/applications/laser_aimer/RM-Plane-yolo26n-p2-2026-04-03.engine"

# Fixed target detector: aggressive morphology, then one area target.
roi_padding_ratio: 0.08
target_team: "blue" # red | blue
red_h_min: 170
red_h_max: 10
red_s_min: 0
red_s_max: 255
red_v_min: 200
red_v_max: 255

blue_h_min: 100
blue_h_max: 140
blue_s_min: 0
blue_s_max: 255
blue_v_min: 200
blue_v_max: 255
open_kernel: 3
close_kernel: 5
min_area: 50.0
max_area: 5000.0
min_aspect: 0.80
max_aspect: 1.15

# LaserTracking pixel controller.
yaw_sign: -1.0
pitch_sign: -1.0
kp: 1.2
deadband_px: 1.0
max_angle_rate: 180.0
lowpass_alpha: 0.45
use_target_kalman: 1
target_kalman_accel_noise: 80.0
target_kalman_meas_noise: 8.0
target_kalman_reset_dt_ms: 250.0
ctrl_dt_nominal_ms: 10.0
ctrl_dt_min_ms: 1.0
ctrl_dt_max_ms: 100.0
use_velocity_ff: 1
ff_alpha: 0.25
ff_rate_max: 150.0
ff_dt_max_ms: 80.0
use_damping: 1
damping_source: "meas"
damping_kd: 0.02
damping_dt_max_ms: 120.0
scan_enable: 1
scan_radius_deg: 12.0
scan_rate_hz: 0.2
scan_pattern: "spiral"
scan_spacing_deg: 6.05
scan_speed_deg_s: 10.0
scan_r_max_deg: 5.0
scan_spiral_return: 0
scan_k_yaw: 1.5
scan_k_pitch: 0.5
scan_enter_delay_ms: 180.0
scan_reacq_confirm_frames: 2

# Rectified camera model used by the controller after undistortion.
fx: 2854.342510
fy: 2851.239471
cx: 659.172967
cy: 534.105012
# Recalibrate these on the undistorted image before closed-loop aiming.
u_L: 697.0
v_L: 461.0

serial_enabled: 1
serial_port: "COM3"
serial_baud: 115200
serial_read_timeout_ms: 2
serial_debug_io: 1
serial_debug_hex: 1
serial_debug_interval_ms: 100

min_detect_count: 1
max_lost_count: 20
loop_rate_hz: 100.0
show_debug: 1
